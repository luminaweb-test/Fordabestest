<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>You Are Da Bestest</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #ff6a88 100%);
    font-family: 'Segoe UI', Tahoma, sans-serif;
    position: relative;
  }

  .hearts-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  .heart {
    position: absolute;
    bottom: -50px;
    color: rgba(255,255,255,0.85);
    font-size: 24px;
    animation: floatUp linear infinite;
    text-shadow: 0 0 8px rgba(255,105,180,0.6);
  }

  @keyframes floatUp {
    0% {
      transform: translateY(0) translateX(0) rotate(0deg) scale(1);
      opacity: 0.9;
    }
    100% {
      transform: translateY(-110vh) translateX(var(--drift, 0px)) rotate(360deg) scale(1.2);
      opacity: 0;
    }
  }

  .content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
  }

  .main-text {
    font-size: clamp(2.5rem, 10vw, 6rem);
    font-weight: 900;
    color: #fff;
    text-shadow:
      0 0 10px rgba(255,255,255,0.6),
      0 0 30px rgba(255,105,180,0.8),
      4px 4px 0px #ff4d6d;
    animation: pulse 1.6s ease-in-out infinite;
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  .big-heart {
    font-size: clamp(4rem, 18vw, 9rem);
    margin: 10px 0;
    animation: beat 1s ease-in-out infinite;
    filter: drop-shadow(0 0 25px rgba(255,255,255,0.7));
  }

  @keyframes beat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.15); }
    40% { transform: scale(0.95); }
  }

  .sub-text {
    margin-top: 10px;
    font-size: clamp(1rem, 3vw, 1.6rem);
    color: #fff7fb;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(255,105,180,0.7);
  }
</style>
</head>
<body>

  <div class="hearts-bg" id="heartsBg"></div>

  <div class="content">
    <div class="big-heart">💖</div>
    <div class="main-text">YOU ARE<br>DA BESTEST</div>
    <div class="sub-text">💕 forever and always 💕</div>
  </div>

  <script>
    const colors = ['❤️','💕','💗','💖','💘','💝','🩷'];
    const bg = document.getElementById('heartsBg');
    const total = 60;

    for (let i = 0; i < total; i++) {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.textContent = colors[Math.floor(Math.random() * colors.length)];

      const size = 16 + Math.random() * 36;
      heart.style.fontSize = size + 'px';
      heart.style.left = Math.random() * 100 + 'vw';

      const duration = 5 + Math.random() * 8;
      heart.style.animationDuration = duration + 's';
      heart.style.animationDelay = (Math.random() * 8) + 's';

      const drift = (Math.random() * 200 - 100) + 'px';
      heart.style.setProperty('--drift', drift);

      bg.appendChild(heart);
    }
  </script>

</body>
</html>
